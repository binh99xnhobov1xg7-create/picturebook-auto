name: Build Picture Book

on:
  workflow_dispatch:
    inputs:
      outline:
        description: '大纲文件名（位于 inputs/，如 L4_Book13_Visiting_Scotland.md）'
        required: true
        default: 'L4_Book13_Visiting_Scotland.md'
      mock_images:
        description: '占位图模式（true / false），false 调用即梦 4.6 真实生图'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify outline exists
        run: |
          if [ ! -f "inputs/${{ inputs.outline }}" ]; then
            echo "::error::找不到 inputs/${{ inputs.outline }}"
            ls inputs/
            exit 1
          fi

      - name: Run pipeline
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          JIMENG_MODEL: ${{ vars.JIMENG_MODEL || 'doubao-seedream-4-5-251128' }}
          MOCK_IMAGES: ${{ inputs.mock_images }}
        run: |
          python scripts/run.py --outline inputs/${{ inputs.outline }}

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: picturebook-${{ inputs.outline }}
          path: outputs/
          retention-days: 30
